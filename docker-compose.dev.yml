services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: transit
      POSTGRES_USER: transit
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transit"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://transit:${DB_PASSWORD:-changeme}@postgres:5432/transit
      OTA_DIR: /data/firmware
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      ADMIN_SECRET: ${ADMIN_SECRET:-changeme_long_random_string}
      BUILD_WORKER_URL: http://build-worker:3001
      SERVER_BASE_URL: http://192.168.178.68:3000
    volumes:
      - firmware_data:/data/firmware
      - ./backend/src:/app/src
      - ./backend/public:/app/public
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s

  build-worker:
    build: ./build-worker
    volumes:
      - ./firmware:/firmware:ro
      - build_cache:/builds
      - pio_work:/work
      - pio_cache:/pio-cache
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development

volumes:
  postgres_data:
  firmware_data:
  build_cache:
  pio_work:
  pio_cache:
