[platformio]
default_envs = firmware-local
src_dir = .

[env:display-test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<display-test/src/>
lib_deps =
  zinggjm/GxEPD2 @ ^1.6.2

; ── Shared firmware settings ──────────────────────────────────────────────────
[env_firmware_base]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware/src/>
lib_deps =
  zinggjm/GxEPD2@^1.6.2
  bblanchon/ArduinoJson@^7.0.0
  tzapu/WiFiManager@^2.0.17
  ricmoo/QRCode@^0.0.1
build_flags =
  -DCORE_DEBUG_LEVEL=3

; ── Production build → transit.megaluke.de ───────────────────────────────────
[env:firmware]
extends = env_firmware_base

; ── Local dev build → your PC's local IP (change to match your machine) ──────
; Flash with: pio run -e firmware-local -t upload
; Then open http://<YOUR_PC_IP>:3000 in browser after docker compose -f docker-compose.dev.yml up
[env:firmware-local]
extends = env_firmware_base
build_flags =
  -DCORE_DEBUG_LEVEL=3
  -DSERVER_BASE_URL='"http://192.168.178.68:3000"'

; ── On-demand build (used by build-worker service) ───────────────────────────
; Build flags injected via EXTRA_FLAGS env var by the build worker.
; Example: EXTRA_FLAGS="-DDISPLAY_BWR -DLANG_DE -DSERVER_BASE_URL='\"https://example.com\"'"
[env:firmware-custom]
extends = env_firmware_base
build_flags =
  -DCORE_DEBUG_LEVEL=0
  ${sysenv.EXTRA_FLAGS}
