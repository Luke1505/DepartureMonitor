; Transit Keychain — ESP32 Firmware

; Shared settings referenced by both environments
[common]
lib_deps =
  zinggjm/GxEPD2 @ ^1.6.2
  bblanchon/ArduinoJson @ ^7.0.0
  arduino-libraries/NTPClient @ ^3.2.1
  tzapu/WiFiManager @ ^2.0.17
  links2004/WebSockets @ ^2.4.1
  ricmoo/QRCode @ ^0.0.1

; Local dev / direct flash environment
[env:esp32dev]
platform      = espressif32
board         = esp32dev
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
lib_deps      = ${common.lib_deps}
build_flags   =
  -DCORE_DEBUG_LEVEL=3
  -DBOARD_HAS_PSRAM

; Cloud build environment — used by build-worker
; Extra flags injected via EXTRA_FLAGS env var:
;   -DDISPLAY_BW or -DDISPLAY_BWR
;   -DLANG_DE / -DLANG_EN / -DLANG_FR
;   -DSERVER_BASE_URL='"https://..."'
[env:firmware-custom]
platform    = espressif32
board       = esp32dev
framework   = arduino
lib_deps    = ${common.lib_deps}
build_flags =
  ${sysenv.EXTRA_FLAGS}
