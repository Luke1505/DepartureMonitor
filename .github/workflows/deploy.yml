name: Deploy
on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.megaluke.de
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            harbor.megaluke.de/transit/backend:latest
            harbor.megaluke.de/transit/backend:${{ github.sha }}

      - name: Build & push build-worker image
        uses: docker/build-push-action@v5
        with:
          context: build-worker
          push: true
          tags: |
            harbor.megaluke.de/transit/build-worker:latest
            harbor.megaluke.de/transit/build-worker:${{ github.sha }}

      - name: Trigger Komodo deploy
        run: curl -s -X POST "${{ secrets.KOMODO_WEBHOOK_URL }}"

  build-firmware:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Build firmware
        uses: docker://infinimesh/platformio:latest
        with:
          args: platformio run

      - name: Upload firmware to transit.megaluke.de
        run: |
          VERSION=$(grep FIRMWARE_VERSION src/main.cpp | head -1 | cut -d'"' -f2 || echo "0.0.0")
          CHANNEL="stable"
          if [[ "${{ github.ref }}" != "refs/heads/main" ]]; then CHANNEL="beta"; fi
          curl -X POST https://transit.megaluke.de/api/firmware/upload \
            -H "X-Admin-Secret: ${{ secrets.ADMIN_SECRET }}" \
            -F "version=${VERSION}" \
            -F "channel=${CHANNEL}" \
            -F "changelog=${{ github.event.head_commit.message }}" \
            -F "bootloader=@.pio/build/esp32dev/bootloader.bin" \
            -F "partitions=@.pio/build/esp32dev/partitions.bin" \
            -F "firmware=@.pio/build/esp32dev/firmware.bin"
