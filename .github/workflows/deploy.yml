name: Deploy
on:
  push:
    branches: ['**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: registry.megaluke.de
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            registry.megaluke.de/transit/backend:latest
            registry.megaluke.de/transit/backend:${{ github.sha }}

      - name: Build & push build-worker image
        uses: docker/build-push-action@v5
        with:
          context: build-worker
          push: true
          tags: |
            registry.megaluke.de/transit/build-worker:latest
            registry.megaluke.de/transit/build-worker:${{ github.sha }}

      - name: Trigger Komodo deploy
        run: |
          curl -sS --fail-with-body \
            -X POST https://docker.megaluke.de/execute/DeployStack \
            -H "Content-Type: application/json" \
            -H "X-API-KEY: ${{ secrets.KOMODO_API_KEY }}" \
            -H "X-API-SECRET: ${{ secrets.KOMODO_API_SECRET }}" \
            -d '{"stack": "transit"}'


